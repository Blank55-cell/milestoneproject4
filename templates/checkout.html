{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="checkout-box">
    <h1>Secure This Property</h1>

    <p><strong>Property:</strong> {{ property.title }}</p>
    <p><strong>Location:</strong> {{ property.location }}</p>
    <p><strong>Holding Deposit:</strong> £250.00</p>
    
    <small class="text-muted">This deposit holds the property and will be applied to your balance upon closing.</small>

    <button id="checkout-button" class="btn" data-listing-id="{{ property.id }}">Pay Holding Deposit (£250)</button>
</div>

{% endblock %}
