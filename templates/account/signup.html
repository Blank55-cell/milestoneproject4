{% extends 'base.html' %}

{% block content %}
<div class="checkout-box">
    <h2>Create an Account</h2>
    <p>Sign up to start booking property viewings.</p>

    <form method="POST" action="{% url 'account_signup' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn" style="width: 100%; margin-top: 15px;">Register</button>
    </form>

    <p style="margin-top: 15px; font-size: 0.9rem; color: #666;">
        Already have an account? <a href="{% url 'account_login' %}" style="color: #007bff; font-weight: 600;">Sign In</a>
    </p>
</div>
{% endblock %}
