{% extends 'base.html' %}

{% block content %}
<div class="checkout-box" style="max-width: 450px; text-align: center;">
    <h2>✉️ Verify Your Email</h2>
    <div class="divider" style="margin: 15px 0; border-top: 1px solid #eee;"></div>

    <p>We have sent an activation link to your email address.</p>
    <p style="color: #666; font-size: 0.95rem;">
        Please check your verification email to complete your registration and unlock your dashboard.
    </p>

    <div class="divider" style="margin: 15px 0; border-top: 1px solid #eee;"></div>
    <a href="{% url 'home' %}" class="btn">Return Home</a>
</div>
{% endblock %}
